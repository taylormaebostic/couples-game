<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couples Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#1a1a2e,#2d132c);color:#fff;min-height:100vh}.app{max-width:500px;margin:0 auto;padding:20px}.header{text-align:center;padding:30px 0}.logo{font-size:32px;background:linear-gradient(135deg,#ff6b6b,#feca57);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.tagline{color:#888;font-size:14px;margin-top:8px}.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:25px;margin:20px 0;border:1px solid rgba(255,107,107,0.2)}.card-title{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:10px}.input{width:100%;background:rgba(0,0,0,0.3);border:2px solid rgba(255,107,107,0.3);border-radius:12px;padding:14px;color:#fff;font-size:16px;margin:10px 0}.input:focus{outline:none;border-color:#ff6b6b}.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin:8px 0}.btn-primary{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff}.btn-secondary{background:rgba(255,255,255,0.1);color:#fff}.btn-pro{background:linear-gradient(135deg,#feca57,#ff9ff3);color:#1a1a2e}.screen{display:none}.screen.active{display:block}.pack-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:15px 0}.pack-card{background:rgba(0,0,0,0.3);border-radius:14px;padding:18px;text-align:center;cursor:pointer;border:2px solid transparent}.pack-card:hover{border-color:#ff6b6b}.pack-icon{font-size:32px;margin-bottom:8px}.pack-name{font-size:13px;font-weight:600}.question-card{background:linear-gradient(135deg,rgba(255,107,107,0.2),rgba(254,202,87,0.1));border:2px solid rgba(255,107,107,0.4);border-radius:20px;padding:35px 25px;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;margin:20px 0}.question-text{font-size:20px;line-height:1.5}.game-controls{display:flex;gap:10px}.game-controls .btn{flex:1}.footer{text-align:center;padding:30px;color:#444;font-size:12px}
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1 class="logo">❤️ Couples Game</h1>
            <p class="tagline">Deepen Your Connection Together</p>
        </div>
        <div id="setup-screen" class="screen active">
            <div class="card">
                <div class="card-title">💍 Getting Started</div>
                <input type="text" id="your-name" class="input" placeholder="Your name">
                <button class="btn btn-primary" onclick="startGame()">✨ Start Playing</button>
            </div>
        </div>
        <div id="game-screen" class="screen">
            <div id="pack-selection">
                <div class="card">
                    <div class="card-title">🎴 Choose a Pack</div>
                    <div class="pack-grid">
                        <div class="pack-card" onclick="selectPack('conversation')"><div class="pack-icon">💬</div><div class="pack-name">Conversation</div></div>
                        <div class="pack-card" onclick="selectPack('fun')"><div class="pack-icon">🎉</div><div class="pack-name">Fun & Playful</div></div>
                        <div class="pack-card" onclick="selectPack('deep')"><div class="pack-icon">💖</div><div class="pack-name">Deep Connection</div></div>
                        <div class="pack-card" onclick="selectPack('intimate')"><div class="pack-icon">🔥</div><div class="pack-name">Intimate</div></div>
                    </div>
                </div>
            </div>
            <div id="question-view" style="display:none">
                <div class="question-card">
                    <div class="question-text" id="q-text">Loading...</div>
                </div>
                <div class="game-controls">
                    <button class="btn btn-secondary" onclick="nextQuestion()">⏭️ Skip</button>
                    <button class="btn btn-primary" onclick="nextQuestion()">✅ Next</button>
                </div>
                <button class="btn btn-secondary" onclick="backToPacks()" style="margin-top:10px">⬅️ Back</button>
            </div>
        </div>
        <div class="footer">💙 Boz Life Store - Making Life Simple</div>
    </div>
    <script>
        const questions={conversation:["What's your favorite memory of us?","If we could travel anywhere, where?","What makes you smile about me?","What should we try this year?","What made you fall in love with me?"],fun:["Do your best impression of me!","Most embarrassing moment before we met?","Give me a 1-minute massage!","What's my most annoying habit?","Sing me your favorite song!"],deep:["What fear haven't you told me?","How do you feel most loved?","What should we do more of together?","What's your dream for our future?","How can I support you better?"],intimate:["Favorite way I show affection?","Describe your ideal romantic evening","Something new to try together?","Most romantic place to visit?","What do I look best in?"]};let currentPack=[];let qIndex=0;function startGame(){document.getElementById('setup-screen').classList.remove('active');document.getElementById('game-screen').classList.add('active')}function selectPack(pack){currentPack=[...questions[pack]].sort(()=>Math.random()-0.5);qIndex=0;showQuestion()}function showQuestion(){document.getElementById('pack-selection').style.display='none';document.getElementById('question-view').style.display='block';document.getElementById('q-text').textContent=currentPack[qIndex]}function nextQuestion(){qIndex=(qIndex+1)%currentPack.length;document.getElementById('q-text').textContent=currentPack[qIndex]}function backToPacks(){document.getElementById('question-view').style.display='none';document.getElementById('pack-selection').style.display='block'}
    </script>
</body>
</html>
